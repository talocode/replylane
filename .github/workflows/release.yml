name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm run test:ci
      - name: Create release assets
        run: |
          mkdir -p release-build
          cp release-assets/* release-build/ 2>/dev/null || true
          cp README.md LICENSE docs/API.md release-build/ 2>/dev/null || true
          cp replylane-demo.mp4 release-build/ 2>/dev/null || true
          cd release-build && sha256sum * > SHA256SUMS 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-build/*
          generate_release_notes: true